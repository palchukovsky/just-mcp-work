name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build release artifacts without creating a GitHub release"
        required: true
        default: true
        type: boolean
      version:
        description: "Prospective version, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    env:
      JMW_VERSION: ${{ inputs.version || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Load tool versions
        run: cat .github/ci-versions.env >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.CI_GO }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${{ env.CI_GOLANGCI_LINT }}

      - name: Verify
        run: GOLANGCI_LINT="$(go env GOPATH)/bin/golangci-lint" just verify

      - name: Package
        run: just package

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: just-mcp-work-${{ env.JMW_VERSION }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release artifacts
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
