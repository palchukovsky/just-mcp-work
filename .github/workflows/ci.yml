name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Load tool versions
        shell: bash
        run: cat .github/ci-versions.env >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.CI_GO }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${{ env.CI_GOLANGCI_LINT }}

      - name: Verify
        shell: bash
        run: GOLANGCI_LINT="$(go env GOPATH)/bin/golangci-lint" just verify
